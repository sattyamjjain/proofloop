name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests + validators
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unittest suite
        run: python3 -m unittest discover tests/ -v
      - name: Validate marketplace.json
        run: python3 scripts/validate_marketplace.py
      - name: README release anchor matches CHANGELOG
        run: python3 scripts/check_readme_release_anchor.py
      - name: Benchmark pack (regression gate)
        run: python3 scripts/benchmark_pack.py

  hooks-lint:
    name: shellcheck hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on hook scripts
        run: shellcheck hooks/*.sh
